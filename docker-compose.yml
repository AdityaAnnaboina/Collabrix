version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gmeet-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gmeetclone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gmeet-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gmeet-backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/gmeetclone?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_ACCESS_SECRET: "supersecretaccesskey123_change_in_production!"
      JWT_REFRESH_SECRET: "supersecretrefreshkey123_change_in_production!"
      FRONTEND_URL: "https://localhost" # Nginx proxy url
      NODE_ENV: production
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gmeet-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_URL: "https://localhost" # Routes requests through Nginx proxy
      NODE_ENV: production
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.25-alpine
    container_name: gmeet-nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
